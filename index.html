<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbum Copa 2026</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #007a33, #009739 45%, #ffd200 160%); padding: 20px;
  }
  .box {
    background: #fff; border-radius: 16px; padding: 28px 24px; width: min(360px, 100%);
    box-shadow: 0 10px 40px rgba(0,40,15,.35); text-align: center;
  }
  .cup { font-size: 44px; }
  h1 { font-size: 18px; color: #1c2420; margin: 8px 0 2px; }
  p.sub { font-size: 13px; color: #6b7a70; margin-bottom: 18px; }
  input[type=password] {
    width: 100%; padding: 12px; border: 2px solid #dfe8df; border-radius: 10px;
    font-size: 16px; outline: none; text-align: center; color: #1c2420;
  }
  input[type=password]:focus { border-color: #009739; }
  label.rem { display: flex; gap: 8px; align-items: center; justify-content: center; font-size: 12.5px; color: #6b7a70; margin: 12px 0; }
  button {
    width: 100%; border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 800;
    background: linear-gradient(120deg, #00a344, #00722d); color: #fff; cursor: pointer; font-family: inherit;
  }
  button:disabled { opacity: .6; }
  .err { color: #d92626; font-size: 13px; font-weight: 600; margin-top: 10px; min-height: 18px; }
</style>
</head>
<body>
<div class="box">
  <div class="cup">🏆🔒</div>
  <h1>Álbum Copa 2026</h1>
  <p class="sub">Este álbum é protegido. Digite a senha para abrir.</p>
  <form id="f">
    <input type="password" id="pw" placeholder="Senha" autocomplete="current-password" autofocus>
    <label class="rem"><input type="checkbox" id="rem" checked> manter desbloqueado neste aparelho</label>
    <button id="go" type="submit">Abrir álbum</button>
    <div class="err" id="err"></div>
  </form>
</div>
